# Gold eval set for doclens retrieval + faithfulness metrics.
#
# relevant_fps values are copied VERBATIM from a throwaway script that ran the
# real pipeline (ingest_file -> chunk_document -> types.fingerprint) over the
# committed evals/corpus/*.md docs. They must not be hand-edited; if the
# corpus docs change, regenerate and re-verify every fingerprint below.
cases:
  # ---------------------------------------------------------------- rfc-style-spec.md
  - id: rfc-01
    doc: rfc-style-spec.md
    question: What TCP port does the Meridian Sync Protocol use by default?
    relevant_fps:
      - '03fe36bd94ce|p1|meridian sync protocol msp version 4 status of'
      - '03fe36bd94ce|p2|ic value 0x4d53 the ascii characters ms a'
    expected_facts:
      - '\b7847\b'
    answerable: true

  - id: rfc-02
    doc: rfc-style-spec.md
    question: What is the maximum size of an MSP object payload, in bytes?
    relevant_fps:
      - '03fe36bd94ce|p1|meridian sync protocol msp version 4 status of'
      - '03fe36bd94ce|p2|ic value 0x4d53 the ascii characters ms a'
    expected_facts:
      - '\b65536\b|64\s*KiB'
    answerable: true

  - id: rfc-03
    doc: rfc-style-spec.md
    question: How many concurrent in-flight requests can a single MSP client have open on one session?
    relevant_fps:
      - '03fe36bd94ce|p1|ecur throughout this specification a session is a'
    expected_facts:
      - '\b32\b\s*concurrent'
    answerable: true

  - id: rfc-04
    doc: rfc-style-spec.md
    question: How many seconds does an MSP client have to complete the handshake before the server drops the connection?
    relevant_fps:
      - '03fe36bd94ce|p2|ic value 0x4d53 the ascii characters ms a'
    expected_facts:
      - '8\s*seconds?'
    answerable: true

  - id: rfc-05
    doc: rfc-style-spec.md
    question: What is the initial retry delay and the maximum number of retries in the MSP backoff schedule?
    relevant_fps:
      - '03fe36bd94ce|p2|cttoolarge also described in section 4 code 0x04'
    expected_facts:
      - '250\s*(ms|milliseconds)'
      - '5\s*retries'
    answerable: true

  - id: rfc-06
    doc: rfc-style-spec.md
    question: How often should MSP keepalive messages be sent on an idle session, and what opcode do they use?
    relevant_fps:
      - '03fe36bd94ce|p3|koff calculation whenever it is present 8 security'
    expected_facts:
      - '45\s*seconds?'
      - '0x0A'
    answerable: true

  - id: rfc-07
    doc: rfc-style-spec.md
    question: What is the maximum object size allowed under the constrained MSP-Lite profile?
    relevant_fps:
      - '03fe36bd94ce|p3|and a fresh payload indicating that two writes'
    expected_facts:
      - '4\s*Ki?B'
    answerable: true

  - id: rfc-08
    doc: rfc-style-spec.md
    question: When was MSP Version 2 formally deprecated, and what error code do conforming servers send if a client proposes it?
    relevant_fps:
      - '03fe36bd94ce|p4|c32c checksum field second error code 0x09 protocolmismatch'
    expected_facts:
      - 'January\s*2025'
      - '0x09'
    answerable: true

  - id: rfc-u1
    doc: rfc-style-spec.md
    question: What programming language is the official Meridian Sync Protocol reference client written in?
    relevant_fps: []
    expected_facts: []
    answerable: false

  - id: rfc-u2
    doc: rfc-style-spec.md
    question: What is the monthly subscription price for the Meridian Sync Protocol hosted cloud service?
    relevant_fps: []
    expected_facts: []
    answerable: false

